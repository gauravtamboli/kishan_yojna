<div class="dialog-wrapper">
  <ion-loading cssClass="custom-loading" [isOpen]="isLoading" [message]="loadingMessage"></ion-loading>

  <div class="header-section">
    <h3>मोबाइल नंबर सत्यापन</h3>
    <p>आपके मोबाइल पे OTP भेजा जा चुका है</p>
  </div>

  <ion-grid>
    <!-- OTP Input Row -->
    <ion-row class="ion-justify-content-center" style="margin-top: 10px; margin-bottom: 20px;">
      <ion-col size="auto" *ngFor="let digit of otpArray; let i = index" style="padding: 4px;">
        <ion-input #otpInput type="text" maxlength="1" inputmode="numeric" class="custom-otp-box" [(ngModel)]="otp[i]"
          (ionInput)="onOtpInput($event, i)">
        </ion-input>
      </ion-col>
    </ion-row>

    <!-- Resend/Timer Section -->
    <ion-row class="ion-justify-content-center ion-align-items-center" style="margin-bottom: 20px;">
      <ion-col size="12" class="ion-text-center">
        <ion-text *ngIf="!isResendEnabled" class="timer-text">
          कृपया प्रतीक्षा करें... {{ counter }} सेकंड
        </ion-text>

        <ion-button fill="clear" class="resend-btn" *ngIf="isResendEnabled" (click)="resendOtp()">
          ओटीपी पुनः भेजें
        </ion-button>
      </ion-col>
    </ion-row>

    <!-- Action Buttons Row -->
    <ion-row class="ion-justify-content-center">
      <ion-col size="6">
        <ion-button expand="block" shape="round" fill="outline" color="medium" (click)="cancelOtpDialog()">
          रद्द करें
        </ion-button>
      </ion-col>
      <ion-col size="6">
        <ion-button expand="block" shape="round" color="success" (click)="onSubmitOTP()">
          सत्यापित
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</div>
